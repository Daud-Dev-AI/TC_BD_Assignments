version: "3.8"

services:

  # -------------------------
  # HADOOP
  # -------------------------

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    environment:
      - CLUSTER_NAME=training
    ports:
      - "9870:9870"
    volumes:
      - namenode:/hadoop/dfs/name
    mem_limit: 1024m

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    depends_on:
      - namenode
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    volumes:
      - datanode:/hadoop/dfs/data
    mem_limit: 1024m

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    depends_on:
      - namenode
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    volumes:
      - datanode2:/hadoop/dfs/data
    mem_limit: 1024m

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    ports:
      - "8088:8088"
    mem_limit: 1024m

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    depends_on:
      - resourcemanager
    environment:
      - SERVICE_PRECONDITION=resourcemanager:8088
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - YARN_CONF_yarn_resourcemanager_hostname=resourcemanager
      - YARN_CONF_yarn_nodemanager_aux_services=mapreduce_shuffle
    mem_limit: 1024m


  # -------------------------
  # SPARK
  # -------------------------

  spark-master:
    image: bde2020/spark-master:3.1.1-hadoop3.2
    container_name: spark-master
    environment:
      - INIT_DAEMON_STEP=setup_spark
    ports:
      - "8080:8080"
    mem_limit: 2048m

  spark-worker:
    image: bde2020/spark-worker:3.1.1-hadoop3.2
    container_name: spark-worker
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    mem_limit: 2048m


  # -------------------------
  # POSTGRES (Hive Metastore)
  # -------------------------

  postgres:
    image: postgres:13
    container_name: hive-metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 512m


  # -------------------------
  # HIVE
  # -------------------------

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    depends_on:
      - postgres
      - namenode
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    volumes:
      - ./hadoop-config:/opt/hadoop/etc/hadoop
    mem_limit: 1024m

  hive-server:
    image: apache/hive:3.1.3
    container_name: hive-server
    depends_on:
      - hive-metastore
      - namenode
    ports:
      - "10000:10000"
    environment:
      SERVICE_NAME: hiveserver2
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      SKIP_SCHEMA_INIT: "true"
      SERVICE_OPTS: >
        -Dhive.metastore.uris=thrift://hive-metastore:9083
    volumes:
      - ./hadoop-config:/opt/hadoop/etc/hadoop
    mem_limit: 1024m
  # -------------------------
  # KAFKA
  # -------------------------

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    mem_limit: 512m

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    mem_limit: 1024m


  # -------------------------
  # JUPYTER (PySpark)
  # -------------------------

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: training123
    mem_limit: 2048m



volumes:
  namenode:
  datanode:
  datanode2:
  pgdata: